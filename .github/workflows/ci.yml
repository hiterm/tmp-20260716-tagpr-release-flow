name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - run: cargo check --workspace --locked
      - run: cargo test --workspace --locked
      - name: Reject latest image references
        run: |
          if grep -R ':latest' --include='Dockerfile' .; then
            echo 'A Dockerfile contains a latest tag' >&2
            exit 1
          fi

  report-dispatch-status:
    if: always() && github.event_name == 'workflow_dispatch'
    needs: rust
    permissions:
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - name: Report result on the release PR commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESULT: ${{ needs.rust.result }}
        run: |
          state=failure
          description='Release PR validation failed'
          if [ "$RESULT" = success ]; then
            state=success
            description='Release PR validation passed'
          fi
          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state="$state" \
            -f context=release-pr-ci \
            -f description="$description"
