name: tagpr release

on:
  push:
    branches: [main]

permissions:
  actions: write
  contents: write
  issues: read
  packages: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: tagpr
        uses: Songmu/tagpr@d1b8138b7a31075141b6cd64103de9485ced7ac9 # v1.20.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Dispatch CI for the release PR
        if: steps.tagpr.outputs.tag == '' && steps.tagpr.outputs.pull_request != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_branch="$(gh pr list --label tagpr --state open --json headRefName --jq '.[0].headRefName')"
          test -n "$release_branch"
          for attempt in 1 2 3 4 5; do
            if gh workflow run ci.yml --ref "$release_branch"; then
              exit 0
            fi
            sleep "$((attempt * 2))"
          done
          exit 1
      - name: Verify released versions agree
        if: steps.tagpr.outputs.tag != ''
        env:
          RELEASE_TAG: ${{ steps.tagpr.outputs.tag }}
        run: |
          cargo metadata --locked --no-deps --format-version 1 > metadata.json
          root_version="$(jq -r '.packages[] | select(.name == "tagpr-release-flow") | .version' metadata.json)"
          e2e_version="$(jq -r '.packages[] | select(.name == "tagpr-release-flow-e2e") | .version' metadata.json)"
          image_version="$(sed -n 's|^FROM ghcr.io/hiterm/tmp-20260716-tagpr-release-flow:\(.*\)$|\1|p' rendercom/Dockerfile)"
          test "$root_version" = "$RELEASE_TAG"
          test "$e2e_version" = "$RELEASE_TAG"
          test "$image_version" = "$RELEASE_TAG"
      - name: Log in to GHCR
        if: steps.tagpr.outputs.tag != ''
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        if: steps.tagpr.outputs.tag != ''
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build and push versioned image
        if: steps.tagpr.outputs.tag != ''
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          build-args: RELEASE_VERSION=${{ steps.tagpr.outputs.tag }}
          tags: ghcr.io/${{ github.repository }}:${{ steps.tagpr.outputs.tag }}
      - name: Verify Render image reference
        if: steps.tagpr.outputs.tag != ''
        run: docker build --pull --file rendercom/Dockerfile --tag tagpr-render-verify:${{ steps.tagpr.outputs.tag }} .
